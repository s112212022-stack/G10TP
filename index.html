<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聯華電子 - 國際策略管理期末專案</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 玻璃擬物化特效 */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.5s ease, border-color 0.5s ease;
        }
        .light-mode .glass-panel {
            background: rgba(255, 255, 255, 0.75) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            backdrop-filter: blur(12px);
        }
        
        .glass-card {
            background: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .light-mode .glass-card, .light-mode .carousel-item {
            background: rgba(204, 238, 255, 0.6) !important;
            border-color: rgba(59, 130, 246, 0.15) !important;
            color: #111827 !important;
            backdrop-filter: blur(8px);
        }
        .glass-card:hover {
            background: rgba(31, 41, 55, 0.6);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
        }
        .light-mode .glass-card:hover, .light-mode .carousel-item:hover {
            background: rgba(179, 226, 255, 0.85) !important;
            border-color: rgba(59, 130, 246, 0.3) !important;
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.15) !important;
        }
        
        .icon-wrapper {
            background-color: rgba(59, 130, 246, 0.1);
            transition: all 0.3s ease;
        }
        .light-mode .icon-wrapper {
            background-color: rgba(255, 255, 255, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px -2px rgba(59, 130, 246, 0.1);
        }
        
        .wafer-bg {
            background: radial-gradient(circle at 50% 50%, rgba(17, 24, 39, 0.6) 0%, rgba(11, 15, 25, 1) 100%);
            transition: background 0.5s ease;
        }
        .light-mode.wafer-bg {
            background: #ffffff !important; 
        }
        
        .light-mode .bg-grid-svg { display: none !important; }

        .light-mode .text-white:not(button .text-white):not(button) { color: #111827 !important; }
        .light-mode .text-gray-300:not(button .text-gray-300):not(button) { color: #374151 !important; }
        .light-mode .text-gray-400:not(button .text-gray-400):not(button) { color: #4b5563 !important; }
        .light-mode .text-gray-500:not(button .text-gray-500):not(button) { color: #6b7280 !important; }
        
        .light-mode .text-blue-400 { color: #1d4ed8 !important; }
        .light-mode .text-indigo-400 { color: #4338ca !important; }
        .light-mode .text-purple-400 { color: #6d28d9 !important; }
        .light-mode .text-emerald-400 { color: #047857 !important; }
        .light-mode .text-amber-400 { color: #b45309 !important; }
        .light-mode .text-cyan-400 { color: #0369a1 !important; }
        .light-mode .text-pink-400 { color: #be185d !important; }
        
        .light-mode button.text-gray-400, .light-mode button.text-gray-300 { color: #4b5563 !important; }
        .light-mode button:hover.text-gray-400, .light-mode button:hover.text-gray-300 { color: #111827 !important; background-color: rgba(0,0,0,0.05) !important; }
        .light-mode .border-gray-800, .light-mode .border-gray-800\/50, .light-mode .border-gray-800\/80 { border-color: rgba(0,0,0,0.1) !important; }
        .light-mode .bg-gray-800, .light-mode .bg-gray-800\/50 { background-color: #e5e7eb !important; }
        
        .light-mode .bg-gray-950\/40, .light-mode .bg-gray-950\/20, .light-mode .bg-gray-900\/30, .light-mode .bg-gray-900\/80 {
            background-color: rgba(255, 255, 255, 0.7) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
        }
        .light-mode .bg-\[\#070a13\], .light-mode .bg-\[\#070a13\]\/90 { background-color: #ffffff !important; }
        .light-mode .bg-\[\#090d16\]\/98 { background-color: #ffffff !important; }
        
        .light-mode button.bg-gradient-to-r, .light-mode button.bg-gradient-to-r span, .light-mode button.bg-gradient-to-r svg {
            color: #ffffff !important;
        }
        
        .carousel-container {
            perspective: 1200px;
            transform-style: preserve-3d;
            touch-action: pan-y; 
        }
        .carousel-item {
            transition: transform 0.7s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.7s ease, border-color 0.4s ease, background-color 0.5s ease;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            min-height: inherit;
            transform-style: preserve-3d;
            transform-origin: center center;
            transition: transform 0.7s ease-in-out;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-face {
            position: absolute;
            inset: 0;
            min-height: inherit;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .six-force-flip-card {
            perspective: 1000px;
            cursor: pointer;
            min-height: 170px;
        }
        .six-force-flip-inner {
            position: relative;
            width: 100%;
            min-height: inherit;
            transform-style: preserve-3d;
            transform-origin: center center;
            transition: transform 0.7s ease-in-out;
        }
        .six-force-flip-card.flipped .six-force-flip-inner {
            transform: rotateY(180deg);
        }
        .six-force-card-front,
        .six-force-card-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
        }
        .six-force-card-back {
            transform: rotateY(180deg);
            overflow-y: auto;
        }
        @media (max-width: 768px) {
            .six-force-flip-card {
                min-height: 190px;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .flip-card-inner {
                transition: none;
            }
            .six-force-flip-inner {
                transition: none;
            }
        }
        .page-transition {
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.6s ease;
        }

        /* 內容淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .strategy-analysis {
            position: relative;
            --group-a: #8b5cf6;
            --group-b: #22d3ee;
            --group-c: #34d399;
            --group-d: #f59e0b;
        }
        .strategy-matrix-wrapper {
            width: 100%;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .strategy-matrix-wrapper::-webkit-scrollbar {
            display: none;
        }
        .strategy-matrix {
            position: relative;
            width: 100%;
            aspect-ratio: 1000 / 520;
            overflow: hidden;
            background:
                radial-gradient(circle at 78% 18%, rgba(139, 92, 246, 0.2), transparent 30%),
                radial-gradient(circle at 56% 56%, rgba(34, 211, 238, 0.14), transparent 32%),
                linear-gradient(145deg, rgba(15, 23, 42, 0.92), rgba(17, 24, 39, 0.56));
            animation: strategyPanelIn 0.55s ease-out both;
            flex-shrink: 0;
        }
        .strategy-y-title {
            position: absolute;
            left: -1.15rem;
            top: 50%;
            z-index: 10;
            width: 9.25rem;
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: center;
            pointer-events: none;
            text-align: center;
            line-height: 1.2;
        }
        .strategy-y-title-main {
            display: block;
            color: #e5e7eb;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0;
        }
        .strategy-y-title-sub {
            display: block;
            margin-top: 0.15rem;
            color: rgba(148, 163, 184, 0.72);
            font-size: 0.62rem;
            font-weight: 600;
        }
        .strategy-y-label {
            position: absolute;
            left: 1.05rem;
            z-index: 10;
            width: 7.7rem;
            padding: 0.42rem 0.52rem;
            border-radius: 0.55rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 28px -20px rgba(139, 92, 246, 0.55);
            pointer-events: none;
            line-height: 1.25;
        }
        .strategy-y-label-top {
            top: 6.5%;
        }
        .strategy-y-label-bottom {
            bottom: 24%;
        }
        .strategy-y-label-main {
            display: block;
            color: #f8fafc;
            font-size: 0.72rem;
            font-weight: 800;
        }
        .strategy-y-label-sub {
            display: block;
            margin-top: 0.15rem;
            color: rgba(148, 163, 184, 0.78);
            font-size: 0.62rem;
            font-weight: 600;
        }
        .strategy-x-title {
            position: absolute;
            left: 50%;
            bottom: 1.35rem;
            z-index: 10;
            width: min(72%, 36rem);
            transform: translateX(-50%);
            pointer-events: none;
            text-align: center;
            color: #e5e7eb;
            font-size: 0.82rem;
            font-weight: 800;
            line-height: 1.15;
        }
        .strategy-x-caption {
            display: block;
            margin-top: 0.16rem;
            color: rgba(148, 163, 184, 0.7);
            font-size: 0.58rem;
            font-weight: 600;
        }
        .strategy-x-label {
            position: absolute;
            bottom: 3.55rem;
            z-index: 10;
            padding: 0.26rem 0.46rem;
            border-radius: 9999px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(15, 23, 42, 0.68);
            backdrop-filter: blur(10px);
            pointer-events: none;
            color: rgba(226, 232, 240, 0.86);
            font-size: 0.66rem;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }
        .strategy-x-label-left {
            left: 10.5%;
        }
        .strategy-x-label-right {
            right: 5.2%;
        }
        .strategy-axis-layer {
            opacity: 0;
            animation: strategyFadeUp 0.5s ease-out 0.1s both;
        }
        .strategy-zone {
            opacity: 0;
            animation: strategyZoneIn 0.6s ease-out 0.45s both;
        }
        .strategy-zone-b { animation-delay: 0.55s; }
        .strategy-zone-c { animation-delay: 0.65s; }
        .strategy-zone-d { animation-delay: 0.75s; }
        .strategy-cluster {
            position: absolute;
            z-index: 5;
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            width: 12rem;
            opacity: 0;
            animation: strategyNodeIn 0.55s ease-out both;
        }
        .strategy-cluster-a { top: 15%; left: 70%; animation-delay: 0.9s; }
        .strategy-cluster-b { top: 52%; left: 53%; animation-delay: 1.05s; }
        .strategy-cluster-c { top: 70%; left: 13%; animation-delay: 1.2s; }
        .strategy-cluster-d { top: 28%; left: 43%; animation-delay: 1.35s; }
        .company-node {
            position: relative;
            display: block;
            width: 5.2rem;
            min-height: 3.8rem;
            padding-top: 2.35rem;
            text-align: center;
            line-height: 1.05;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.45);
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
        }
        .company-node::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 2.1rem;
            height: 2.1rem;
            border-radius: 9999px;
            transform: translateX(-50%);
            border: 1px solid color-mix(in srgb, var(--group-color), white 32%);
            background:
                radial-gradient(circle at 35% 30%, rgba(255,255,255,0.85), transparent 18%),
                color-mix(in srgb, var(--group-color), rgba(2, 6, 23, 0.78) 70%);
            box-shadow: 0 0 20px color-mix(in srgb, var(--group-color), transparent 28%);
            transition: box-shadow 0.28s ease, border-color 0.28s ease;
        }
        .strategy-cluster:hover .company-node,
        .strategy-cluster:focus-within .company-node,
        .company-node:hover {
            transform: scale(1.08);
        }
        .strategy-cluster:hover .company-node::before,
        .strategy-cluster:focus-within .company-node::before,
        .company-node:hover::before {
            border-color: color-mix(in srgb, var(--group-color), white 52%);
            box-shadow: 0 0 30px color-mix(in srgb, var(--group-color), transparent 5%);
        }
        .strategy-links {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .strategy-link {
            fill: none;
            stroke-width: 2.4;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.48;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: strategyDraw 1s ease-in-out 1.65s forwards;
            filter: drop-shadow(0 0 8px currentColor);
            transition: opacity 0.25s ease, stroke-width 0.25s ease;
        }
        .strategy-group-card {
            opacity: 0;
            transform: translateY(14px);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
            animation: strategyCardIn 0.55s ease-out 2.1s forwards;
        }
        .strategy-group-card:nth-child(2) { animation-delay: 2.2s; }
        .strategy-group-card:nth-child(3) { animation-delay: 2.3s; }
        .strategy-group-card:nth-child(4) { animation-delay: 2.4s; }
        .strategy-analysis:has([data-strategy-group="a"]:hover) [data-group-line="a"],
        .strategy-analysis:has([data-strategy-group="a"]:focus-within) [data-group-line="a"],
        .strategy-analysis:has([data-group-card="a"]:hover) [data-group-line="a"],
        .strategy-analysis:has([data-strategy-group="b"]:hover) [data-group-line="b"],
        .strategy-analysis:has([data-strategy-group="b"]:focus-within) [data-group-line="b"],
        .strategy-analysis:has([data-group-card="b"]:hover) [data-group-line="b"],
        .strategy-analysis:has([data-strategy-group="c"]:hover) [data-group-line="c"],
        .strategy-analysis:has([data-strategy-group="c"]:focus-within) [data-group-line="c"],
        .strategy-analysis:has([data-group-card="c"]:hover) [data-group-line="c"],
        .strategy-analysis:has([data-strategy-group="d"]:hover) [data-group-line="d"],
        .strategy-analysis:has([data-strategy-group="d"]:focus-within) [data-group-line="d"],
        .strategy-analysis:has([data-group-card="d"]:hover) [data-group-line="d"] {
            opacity: 1;
            stroke-width: 3.8;
        }
        .strategy-analysis:has([data-strategy-group="a"]:hover) [data-group-card="a"],
        .strategy-analysis:has([data-strategy-group="a"]:focus-within) [data-group-card="a"],
        .strategy-analysis:has([data-group-card="a"]:hover) [data-group-card="a"],
        .strategy-analysis:has([data-strategy-group="b"]:hover) [data-group-card="b"],
        .strategy-analysis:has([data-strategy-group="b"]:focus-within) [data-group-card="b"],
        .strategy-analysis:has([data-group-card="b"]:hover) [data-group-card="b"],
        .strategy-analysis:has([data-strategy-group="c"]:hover) [data-group-card="c"],
        .strategy-analysis:has([data-strategy-group="c"]:focus-within) [data-group-card="c"],
        .strategy-analysis:has([data-group-card="c"]:hover) [data-group-card="c"],
        .strategy-analysis:has([data-strategy-group="d"]:hover) [data-group-card="d"],
        .strategy-analysis:has([data-strategy-group="d"]:focus-within) [data-group-card="d"],
        .strategy-analysis:has([data-group-card="d"]:hover) [data-group-card="d"] {
            transform: translateY(-4px);
            border-color: color-mix(in srgb, var(--group-color), white 30%);
            box-shadow: 0 18px 40px -28px var(--group-color);
        }
        @keyframes strategyPanelIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes strategyFadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes strategyZoneIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 0.72; transform: scale(1); }
        }
        @keyframes strategyNodeIn {
            from { opacity: 0; transform: translateY(12px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes strategyDraw {
            to { stroke-dashoffset: 0; }
        }
        @keyframes strategyCardIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .strategy-matrix {
                width: 900px;
                height: 468px;
                aspect-ratio: auto;
            }
            .strategy-y-title {
                left: -0.85rem;
                width: 8.75rem;
            }
            .strategy-y-title-main {
                font-size: 0.72rem;
            }
            .strategy-y-title-sub {
                font-size: 0.56rem;
            }
            .strategy-y-label {
                left: 0.8rem;
                width: 7.2rem;
                padding: 0.38rem 0.5rem;
            }
            .strategy-y-label-main {
                font-size: 0.66rem;
            }
            .strategy-y-label-sub {
                font-size: 0.56rem;
            }
            .strategy-y-label-top {
                top: 6%;
            }
            .strategy-y-label-bottom {
                bottom: 24.5%;
            }
            .strategy-x-title {
                bottom: 1.1rem;
                width: 64%;
                font-size: 0.72rem;
            }
            .strategy-x-caption {
                font-size: 0.52rem;
            }
            .strategy-x-label {
                bottom: 3.35rem;
                font-size: 0.58rem;
            }
            .strategy-x-label-left {
                left: 10.2%;
            }
            .strategy-x-label-right {
                right: 4.8%;
            }
        }

        /* 時間軸樣式 */
        .timeline-path { stroke: rgba(255,255,255,0.2); transition: stroke 0.5s ease; }
        .light-mode .timeline-path { stroke: rgba(0,0,0,0.8) !important; }
        .light-mode-timeline-mobile { transition: background-color 0.5s ease; }
        .light-mode .light-mode-timeline-mobile { background-color: rgba(0,0,0,0.8) !important; }
        .light-mode .light-mode-bg-fix { background-color: #ffffff !important; }

        /* 圖片暗色模式反轉與色相旋轉特效 */
        .dark-mode-map-img {
            filter: invert(1) hue-rotate(180deg) brightness(1.2);
            transition: filter 0.5s ease;
        }
        .light-mode .dark-mode-map-img {
            filter: none;
        }

        /* 組織架構圖暗色模式反轉特效 */
        .dark-mode-org-img {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.1);
            transition: filter 0.5s ease;
        }
        .light-mode .dark-mode-org-img {
            filter: none;
        }
    </style>
</head>
<body id="app-body" class="wafer-bg h-[100dvh] w-screen flex flex-col justify-between overflow-hidden">

    <!-- 靜態科技背景線條 -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden opacity-10 bg-grid-svg">
        <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
                    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="currentColor" stroke-width="1"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" class="text-white light-mode-text" />
            <circle cx="50%" cy="50%" r="35%" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="10, 15" class="text-blue-500" />
            <circle cx="50%" cy="50%" r="20%" fill="none" stroke="currentColor" stroke-width="1" class="text-blue-400" />
        </svg>
    </div>

    <!-- 頁頂導覽列 -->
    <header class="relative z-30 w-full px-4 lg:px-16 py-3 flex items-center justify-between border-b border-gray-800/50 light-mode-border glass-panel shrink-0">
        <div class="flex items-center space-x-4">
            <button onclick="toggleSidebar()" class="p-2 text-gray-400 hover:text-white dark:hover:text-white hover:bg-gray-800/60 rounded-xl transition-all focus:outline-none flex items-center justify-center border border-gray-800 light-mode-btn-border hover:border-gray-700">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <div class="flex items-center space-x-3 cursor-pointer" onclick="goToHome()">
                <div class="w-9 h-9 bg-white rounded-md flex items-center justify-center p-1 shadow-lg shadow-blue-500/20">
                    <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#0033a0">UMC</text>

                    transformStyle = diff < 0 
                        ? 'translateX(-220%) scale(0.6) translateZ(-150px) rotateY(55deg)' 
                        : 'translateX(220%) scale(0.6) translateZ(-150px) rotateY(-55deg)';
                    opacity = 0; zIndex = 0; pointerEvents = 'none';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)'; card.style.boxShadow = 'none';
                }
                card.style.transform = transformStyle; card.style.opacity = opacity;
                card.style.zIndex = zIndex; card.style.pointerEvents = pointerEvents;
            });
        }

        function setActiveIndex(index) {
            if (index < 0) activeIndex = SECTIONS.length - 1;
            else if (index >= SECTIONS.length) activeIndex = 0;
            else activeIndex = index;
            updateCarousel();
        }

        function prevSlide() { setActiveIndex(activeIndex - 1); }
        function nextSlide() { setActiveIndex(activeIndex + 1); }

        let isTouchDevice = false;
        window.addEventListener('touchstart', () => { isTouchDevice = true; }, { passive: true });

        let holdInterval, holdTimeout;
        function startHold(direction, event) {
            if (isTouchDevice && event && event.type === 'mousedown') return;

            if (direction === 'next') nextSlide(); else prevSlide();
            holdTimeout = setTimeout(() => {
                holdInterval = setInterval(() => { if (direction === 'next') nextSlide(); else prevSlide(); }, 400); 
            }, 400);
        }
        function stopHold() { clearTimeout(holdTimeout); clearInterval(holdInterval); }

        function setupTouchGestures() {
            const viewport = document.getElementById('carousel-viewport');
            let startX = 0;
            let currentX = 0;
            let swipeThreshold = 50; 

            viewport.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                dragOccurred = false;
            }, { passive: true });

            viewport.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
                const diffX = currentX - startX;
                if (Math.abs(diffX) > 10) {
                    dragOccurred = true; 
                }
            }, { passive: true });

            viewport.addEventListener('touchend', (e) => {
                if (!dragOccurred) return;

                const diffX = currentX - startX;
                if (Math.abs(diffX) >= swipeThreshold) {
                    if (diffX > 0) {
                        prevSlide(); 
                    } else {
                        nextSlide(); 
                    }
                }
                
                setTimeout(() => {
                    dragOccurred = false;
                }, 200);
            }, { passive: true });
        }

        function handleHover(isEnter, id) {
            if (isTouchDevice) return; 
            const submenu = document.getElementById(`submenu-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (isEnter) {
                submenu.style.maxHeight = '500px';
                chevron.classList.add('rotate-180');
            } else {
                submenu.style.maxHeight = '0';
                chevron.classList.remove('rotate-180');
            }
        }

        function toggleMenu(id) {
            const submenu = document.getElementById(`submenu-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (submenu.style.maxHeight === '500px') {
                submenu.style.maxHeight = '0';
                chevron.classList.remove('rotate-180');
            } else {
                submenu.style.maxHeight = '500px';
                chevron.classList.add('rotate-180');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                sidebar.classList.remove('-translate-x-full');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
            
            ['com', 'market', 'resource', 'growth'].forEach(id => {
                const submenu = document.getElementById(`submenu-${id}`);
                if (submenu) submenu.style.maxHeight = '0';
                document.getElementById(`chevron-${id}`)?.classList.remove('rotate-180');
            });
        }

        function jumpToSection(index, elementId = null) {
            activeIndex = index;
            updateCarousel();
            enterCurrentSection();
            closeSidebar();
            if (elementId) {
                setTimeout(() => {
                    const targetEl = document.getElementById(elementId);
                    if (targetEl) {
                        const y = targetEl.getBoundingClientRect().top + window.pageYOffset - 100;
                        document.getElementById('content-container').scrollTo({top: y, behavior: 'smooth'});
                    }
                }, 400); 
            }
        }

        let wheelAccumulator = 0;
        let wheelResetTimeout = null;
        let isWheelLocked = false; 
        const scrollThreshold = 10; 

        window.addEventListener('wheel', function(event) {
            if (!document.getElementById('content-container').classList.contains('hidden')) return; 
            
            if (isWheelLocked) return;

            let delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
            
            wheelAccumulator += delta;

            clearTimeout(wheelResetTimeout);
            wheelResetTimeout = setTimeout(() => { wheelAccumulator = 0; }, 200);

            if (Math.abs(wheelAccumulator) >= scrollThreshold) {
                if (wheelAccumulator > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
                
                wheelAccumulator = 0;

                isWheelLocked = true;
                setTimeout(() => {
                    isWheelLocked = false;
                }, 150);
            }
        });

        window.addEventListener('keydown', function(event) {
            const isContentOpen = !document.getElementById('content-container').classList.contains('hidden');
            if (isContentOpen) {
                if (event.key === "ArrowLeft") switchContentSection(-1);
                else if (event.key === "ArrowRight") switchContentSection(1);
                else if (event.key === "Escape") goToHome();
            } else {
                if (event.key === "ArrowLeft") prevSlide();
                else if (event.key === "ArrowRight") nextSlide();
                else if (event.key === "Enter") enterCurrentSection();
            }
        });

        document.body.addEventListener('click', () => window.focus());

        function toggleFlipCard(card) {
            card.classList.toggle('flipped');
            card.setAttribute('aria-pressed', card.classList.contains('flipped') ? 'true' : 'false');
        }

        document.addEventListener('click', function(event) {
            if (!(event.target instanceof Element)) return;
            const card = event.target.closest('.flip-card');
            if (!card) return;

            toggleFlipCard(card);
        });

        document.addEventListener('keydown', function(event) {
            if (!(event.target instanceof Element)) return;
            const card = event.target.closest('.flip-card');
            if (!card || (event.key !== 'Enter' && event.key !== ' ')) return;

            event.preventDefault();
            toggleFlipCard(card);
        });

        function toggleSixForceFlipCard(card) {
            card.classList.toggle('flipped');
            card.setAttribute('aria-pressed', card.classList.contains('flipped') ? 'true' : 'false');
        }

        document.addEventListener('click', function(event) {
            if (!(event.target instanceof Element)) return;
            const card = event.target.closest('.six-force-flip-card');
            if (!card) return;

            toggleSixForceFlipCard(card);
        });

        document.addEventListener('keydown', function(event) {
            if (!(event.target instanceof Element)) return;
            const card = event.target.closest('.six-force-flip-card');
            if (!card || (event.key !== 'Enter' && event.key !== ' ')) return;

            event.preventDefault();
            toggleSixForceFlipCard(card);
        });

        function enterCurrentSection() {
            const item = SECTIONS[activeIndex];
            document.getElementById('current-section-title').innerText = currentLang === 'zh' ? item.title_zh : item.title_en;
            document.getElementById('current-section-index').innerText = `${activeIndex + 1} / ${SECTIONS.length}`;
            document.getElementById('content-display-box').innerHTML = currentLang === 'zh' ? item.content_zh : item.content_en;

            const landing = document.getElementById('landing-page');
            const content = document.getElementById('content-container');
            landing.style.transform = 'scale(0.9) translateZ(-100px)';
            landing.style.opacity = '0';
            
            setTimeout(() => {
                landing.classList.add('hidden');
                content.classList.remove('hidden');
                content.scrollTop = 0;
            }, 300);
        }

        function switchContentSection(direction) {
            let nextIdx = activeIndex + direction;
            if (nextIdx < 0) nextIdx = SECTIONS.length - 1;
            if (nextIdx >= SECTIONS.length) nextIdx = 0;
            activeIndex = nextIdx;
            
            updateCarousel();
            const item = SECTIONS[activeIndex];
            document.getElementById('current-section-title').innerText = currentLang === 'zh' ? item.title_zh : item.title_en;
            document.getElementById('current-section-index').innerText = `${activeIndex + 1} / ${SECTIONS.length}`;
            
            const displayBox = document.getElementById('content-display-box');
            displayBox.style.opacity = '0';
            setTimeout(() => {
                displayBox.innerHTML = currentLang === 'zh' ? item.content_zh : item.content_en;
                displayBox.style.opacity = '1';
                document.getElementById('content-container').scrollTop = 0; 
            }, 150);
        }

        function goToHome() {
            const landing = document.getElementById('landing-page');
            const content = document.getElementById('content-container');
            content.classList.add('hidden');
            landing.classList.remove('hidden');
            setTimeout(() => {
                landing.style.transform = 'scale(1) translateZ(0)';
                landing.style.opacity = '1';
                updateCarousel();
            }, 50);
        }

        // 明暗模式切換邏輯
        function toggleDarkMode() {
            const body = document.getElementById('app-body');
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            
            body.classList.toggle('light-mode');
            
            const isLight = body.classList.contains('light-mode');
            if (isLight) {
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        // 中英切換邏輯
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            
            document.getElementById('lang-toggle-btn').innerText = currentLang === 'zh' ? '中/EN' : 'EN/中';
            
            const elements = document.querySelectorAll('[data-zh]');
            elements.forEach(el => {
                el.innerText = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
            });
            
            initCarousel();
            
            const isContentOpen = !document.getElementById('content-container').classList.contains('hidden');
            if (isContentOpen) {
                const item = SECTIONS[activeIndex];
                document.getElementById('current-section-title').innerText = currentLang === 'zh' ? item.title_zh : item.title_en;
                document.getElementById('content-display-box').innerHTML = currentLang === 'zh' ? item.content_zh : item.content_en;
            }
        }

        // 語音朗讀功能實裝 (Web Speech API)
        function speakCurrentCard() {
            if (!('speechSynthesis' in window)) {
                alert("抱歉，您的瀏覽器不支援語音合成功能！");
                return;
            }
            window.speechSynthesis.cancel();
            
            const currentItem = SECTIONS[activeIndex];
            let textToSpeak = "";
            let speechLang = "zh-TW";
            
            if (currentLang === 'zh') {
                textToSpeak = `當前章節：${currentItem.title_zh}。`;
                speechLang = "zh-TW";
            } else {
                textToSpeak = `Current section is: ${currentItem.title_en}.`;
                speechLang = "en-US";
            }
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = speechLang;
            utterance.rate = 1.0; 
            
            window.speechSynthesis.speak(utterance);
        }

        window.onload = function() {
            initCarousel();
            window.focus();
        };
    </script>
</body>
</html>
